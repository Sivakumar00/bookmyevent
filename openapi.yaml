openapi: 3.0.3
info:
  title: BookMyEvent API
  description: |
    Ticketing system API for event organisers to create & manage events.
    Users can purchase/reserve tickets for events.
  version: 1.0.0
  contact:
    name: API Support
    email: support@bookmyevent.com
servers:
  - url: http://localhost:3000
    description: Development server
tags:
  - name: App
    description: Application health check
  - name: Links
    description: URL management endpoints
paths:
  /:
    get:
      operationId: AppController_getHello
      summary: Root endpoint
      description: Returns a greeting message to verify the API is running
      tags:
        - App
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: string
              example: 'Hello World'
  /links:
    post:
      operationId: LinksController_create
      summary: Create a new link
      description: Creates a new URL link with the provided details
      tags:
        - Links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkDto'
            example:
              title: 'New Event'
              url: 'https://example.com/event'
              description: 'A new event for testing'
      responses:
        '201':
          description: Link created successfully
          content:
            application/json:
              schema:
                type: string
              example: "TODO: This action should add a new link 'New Event'"
        '400':
          description: Bad request - invalid input data
    get:
      operationId: LinksController_findAll
      summary: Get all links
      description: Retrieves a list of all stored URL links
      tags:
        - Links
      responses:
        '200':
          description: List of links retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Link'
              example:
                - id: 0
                  title: 'Installation'
                  url: 'https://turborepo.dev/docs/getting-started/installation'
                  description: 'Get started with Turborepo in a few moments using'
                - id: 1
                  title: 'Crafting'
                  url: 'https://turborepo.dev/docs/crafting-your-repository'
                  description: 'Architecting a monorepo is a careful process.'
  /links/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Unique identifier of the link
        schema:
          type: string
        example: '1'
    get:
      operationId: LinksController_findOne
      summary: Get a link by ID
      description: Retrieves a specific link by its unique identifier
      tags:
        - Links
      responses:
        '200':
          description: Link found and returned
          content:
            application/json:
              schema:
                type: string
              example: 'TODO: This action should return a Link with id #1'
        '404':
          description: Resource not found
    patch:
      operationId: LinksController_update
      summary: Update a link
      description: Partially updates an existing link with new data
      tags:
        - Links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLinkDto'
            example:
              title: 'Updated Event Title'
      responses:
        '200':
          description: Link updated successfully
          content:
            application/json:
              schema:
                type: string
              example: 'TODO: This action should update a #1 link Updated Event Title'
        '404':
          description: Resource not found
    delete:
      operationId: LinksController_remove
      summary: Delete a link
      description: Removes a link from the system permanently
      tags:
        - Links
      responses:
        '200':
          description: Link deleted successfully
          content:
            application/json:
              schema:
                type: string
              example: 'TODO: This action should remove a #1 link'
        '404':
          description: Resource not found
components:
  schemas:
    Link:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier
          example: 1
        title:
          type: string
          description: Display title for the link
          example: 'Installation Guide'
        url:
          type: string
          format: uri
          description: Full URL to the resource
          example: 'https://turborepo.dev/docs'
        description:
          type: string
          description: Brief description of the link content
          example: 'Get started with Turborepo in a few moments'
      required:
        - id
        - title
        - url
        - description
    CreateLinkDto:
      type: object
      properties:
        title:
          type: string
          description: Display title for the new link
          minLength: 1
          maxLength: 255
          example: 'New Event'
        url:
          type: string
          format: uri
          description: Full URL to the resource
          example: 'https://example.com/event'
        description:
          type: string
          description: Brief description of the link content
          maxLength: 1000
          example: 'A new event for testing'
      required:
        - title
        - url
    UpdateLinkDto:
      type: object
      properties:
        title:
          type: string
          description: Updated display title
          minLength: 1
          maxLength: 255
          example: 'Updated Event Title'
        url:
          type: string
          format: uri
          description: Updated URL
          example: 'https://example.com/updated-event'
        description:
          type: string
          description: Updated description
          maxLength: 1000
          example: 'Updated description'
