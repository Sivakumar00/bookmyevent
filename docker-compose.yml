version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: bookmyevent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookmyevent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: bookmyevent-api
    container_name: bookmyevent-api
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: bookmyevent
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local